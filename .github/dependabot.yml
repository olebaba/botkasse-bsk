version: 2
updates:
  # Bun / package.json + bun.lock dependencies
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "Dependabot auto-update"
      prefix-development: "Dependabot auto-update (dev)"
    groups:
      # Group all non-major updates together to reduce PR noise
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # ESLint 10 is not yet supported by the Next.js ESLint stack.
      # eslint-config-next 16 depends on eslint-plugin-react 7.37.x,
      # which caps its peer dependency at eslint@^9.7. Re-enable once
      # eslint-plugin-react ships ESLint 10 support.
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Oslo"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "Dependabot auto-update (CI)"
